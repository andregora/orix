const GRID_COLS = 130, GRID_ROWS = 130, MAX_HEIGHT = 10;
const NORMAL_TOTAL_TILES = 8;

let tileFolders = Object.keys(EMBEDDED_TILES);

let tiles = {};
let staticTileMap = null;
let readyToDraw = false;

let lastFrameTime = 0;
const FRAME_INTERVAL = 83;
const T_STEP = 1/12;

// AUTO-MODO (controle automático reagindo ao áudio)
const AUTO_MODE_CHANGE_BASE_INTERVAL = 4;       // segundos em volume baixo
const AUTO_MODE_CHANGE_AUDIO_FACTOR = 7;        // quanto o áudio encurta esse intervalo
const AUTO_TILESET_CHANGE_BASE_INTERVAL = 7;    // segundos em volume baixo
const AUTO_TILESET_CHANGE_AUDIO_FACTOR = 9;
const AUTO_BG_SPEED_BASE = 0.03;                // velocidade base do BG (ciclos por segundo)
const AUTO_BG_SPEED_AUDIO_FACTOR = 0.2;
const AUTO_KNOB2_SPEED_BASE = 0.06;             // velocidade base de variação da tile principal
const AUTO_KNOB2_SPEED_AUDIO_FACTOR = 0.25;

// combinação de nível/variância para sentir a “força” do áudio
const AUTO_INTENSITY_LEVEL_WEIGHT = 0.7;
const AUTO_INTENSITY_VAR_WEIGHT = 0.3;
const AUTO_INTENSITY_GAIN = 2.2;

// detecção simples de batida
const AUTO_BEAT_LEVEL_THRESHOLD = 0.06;         // nível mínimo para considerar batida
const AUTO_BEAT_DELTA_THRESHOLD = 0.018;        // quanto o nível precisa subir entre frames
const AUTO_BEAT_MODE_CHANGE_PROB = 0.9;         // chance de trocar modo numa batida
const AUTO_BEAT_TILESET_CHANGE_PROB = 0.7;      // chance de trocar tileset numa batida forte
const AUTO_STATIC_TOGGLE_BEAT_PROB = 0.35;      // chance de alternar entre mapa estático e “limpo” numa batida

let autoModeEnabled = true;
let autoLastModeChange = 0;
let autoLastTilesetChange = 0;
let autoPrevAudioLevel = 0;

let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const resolutionMultiplier = 2; // Aumenta a resolução para melhor qualidade ao aproximar
  W = window.innerWidth;
  H = window.innerHeight;
  
  // Configura o tamanho real do canvas (alta resolução)
  canvas.width = W * dpr * resolutionMultiplier;
  canvas.height = H * dpr * resolutionMultiplier;
  
  // Configura o tamanho CSS do canvas (tamanho visual)
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  
  // Reseta a transformação e aplica a escala
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr * resolutionMultiplier, dpr * resolutionMultiplier);
  
  // Desabilita suavização para pixel perfect
  ctx.imageSmoothingEnabled = false;
  ctx.webkitImageSmoothingEnabled = false;
  ctx.mozImageSmoothingEnabled = false;
  ctx.msImageSmoothingEnabled = false;
}

let W = window.innerWidth, H = window.innerHeight;
setupCanvas();

function lerp(a, b, t){ return a + (b - a) * t; }
function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

const DEFAULTS = {
  knob1_idx: 0,
  knob2: 0.0,
  knob5: 0.0,
  animationModeIdx: 0,
  staticTileMap: null
};
let knob1_idx = DEFAULTS.knob1_idx;
let knob2 = DEFAULTS.knob2;
let knob5 = DEFAULTS.knob5;
let animationModeIdx = DEFAULTS.animationModeIdx;

const animationModes = [
  "onda_radial",
  "ondas_horizontais",
  "ondas_verticais",
  "espiral",
  "circulo_pulsante",
  "mar_caotico",
  "anel_respira",
  "ondas_diagonais",
  "cruz_pulsante",
  "grade_batendo"
];

function stepKnob(val, step=0.25) {
  val += step;
  if(val > 1) val = 0;
  return val;
}

function generateStaticTileMap() {
  staticTileMap = [];
  const count = NORMAL_TOTAL_TILES;
  for(let gx=0; gx<GRID_COLS; gx++){
    staticTileMap[gx] = [];
    for(let gy=0; gy<GRID_ROWS; gy++){
      staticTileMap[gx][gy] = Math.floor(Math.random() * count);
    }
  }
}

function reloadAllTiles(onReady) {
  readyToDraw = false;
  tiles = {};
  let folders = [...tileFolders];
  let numTiles = 0;
  for (let folder of folders) {
    let dataArr = EMBEDDED_TILES[folder] || [];
    numTiles += dataArr.length;
  }
  let loaded = 0;
  for (let folder of folders) {
    let dataArr = EMBEDDED_TILES[folder] || [];
    let count = dataArr.length;
    tiles[folder] = [];
    for (let i = 0; i < count; i++) {
      let img = new Image();
      img.onload = () => {
        tiles[folder][i] = img;
        loaded++; if (loaded === numTiles) { readyToDraw = true; onReady && onReady(); }
      };
      img.src = dataArr[i];
    }
  }
}


// ÁUDIO
let audioCtx, analyser, dataArray, micStream;
let audioLevel = 0, audioVar = 0;

function setupAudio(onReady) {
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(stream => {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // em alguns casos: audioCtx.resume();
      micStream = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      dataArray = new Uint8Array(analyser.fftSize);
      micStream.connect(analyser);
      console.log("Áudio inicializado");
      onReady && onReady();
    })
    .catch(err => {
      console.error("Erro ao acessar microfone:", err);
      alert("Erro ao acessar microfone: " + err.message);
    });
}

function analyzeAudio() {
  if (!analyser) return;
  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for(let i=0; i<dataArray.length; i++){
    let v = (dataArray[i]-128)/128;
    sum += v*v;
  }
  let rms = Math.sqrt(sum/dataArray.length);
  audioLevel = lerp(audioLevel, rms, 0.25);

  let mean = 0, vSum = 0;
  for(let i=0; i<dataArray.length; i++) mean += dataArray[i];
  mean /= dataArray.length;
  for(let i=0; i<dataArray.length; i++) vSum += (dataArray[i]-mean)**2;
  audioVar = lerp(audioVar, Math.sqrt(vSum/dataArray.length)/128, 0.2);
}

function get_tile_index(knob_value, count) {
  let idx = Math.floor(knob_value * count);
  return clamp(idx, 0, count-1);
}
function get_background_color(knob_value) {
  let idx = Math.floor(knob_value * BG_COLORS.length);
  return BG_COLORS[clamp(idx, 0, BG_COLORS.length-1)];
}
function iso_coords(gx, gy, h, grid_cols, grid_rows) {
  let offset_x = (W/2) - ((ISO_TILE_WIDTH/2)*(grid_cols/2+grid_rows/2));
  let offset_y = (H/2) - ((ISO_TILE_HEIGHT/2)*(grid_cols/2+grid_rows/2));
  let x = (gx-gy)*(ISO_TILE_WIDTH/2) + offset_x + 2065;
  let y = (gx+gy)*(ISO_TILE_HEIGHT/2) - h*(TILE_HEIGHT/2) + offset_y + 120;
  return [x, y];
}

function alturaTile(gx, gy, t, mode, params) {
  let { amplitude, wave_speed, wave_length, audioVar, audioLevel } = params;
  let cx = GRID_COLS/2, cy = GRID_ROWS/2;
  let dx = gx - cx, dy = gy - cy;
  let dist = Math.sqrt(dx*dx + dy*dy);

  switch(mode) {
    case "onda_radial":
      return Math.floor((Math.sin((dist/2.5) - t * wave_speed)+1)*0.5*amplitude) + 1;
    case "ondas_horizontais":
      return Math.floor((Math.sin((gx/wave_length) - t * wave_speed)+1)*0.5*amplitude) + 1;
    case "ondas_verticais":
      return Math.floor((Math.sin((gy/wave_length) - t * wave_speed)+1)*0.5*amplitude) + 1;
    case "espiral":
      let angle = Math.atan2(dy, dx);
      return Math.floor((Math.sin((dist/2.5) - t * wave_speed + angle*2)+1)*0.5*amplitude) + 1;
    case "circulo_pulsante": {
      // "Flor" radial: pétalas girando em volta do centro, reagindo ao áudio
      const petals = 7;
      const angle2 = Math.atan2(dy, dx);
      const radialWave = Math.sin((dist / 3) - t * (wave_speed * 0.9 + audioLevel * 2));
      const petalShape = Math.cos(angle2 * petals + t * (0.6 + audioVar * 1.5));
      const mix = radialWave * 0.6 + petalShape * 0.4;
      const level = (mix + 1) * 0.5; // normaliza para [0,1]
      return 1 + Math.floor(level * (amplitude - 1));
    }
    case "mar_caotico":
      let caos = Math.sin((gx+gy)/2 - t*wave_speed*1.5 + Math.sin(gx*gy))*Math.sin((gy/2) + t*wave_speed*0.8);
      return Math.floor((caos+1)*0.5*amplitude) + 1;
    case "anel_respira": {
      const baseRadius = 10;
      const pulseRadius = baseRadius + Math.sin(t * (0.8 + audioLevel * 3)) * (4 + audioVar * 10);
      const ringWidth = 3 + audioVar * 5;
      const ringDist = Math.abs(dist - pulseRadius);
      const core = ringDist < ringWidth ? amplitude : 1;
      return core;
    }
    case "ondas_diagonais": {
      const diag = (gx + gy) / (wave_length * 0.8 + 0.5);
      return Math.floor((Math.sin(diag - t * wave_speed * (0.5 + audioVar * 1.5)) + 1) * 0.5 * amplitude) + 1;
    }
    case "cruz_pulsante": {
      const lineStrengthX = Math.exp(-Math.abs(dx) * 0.25);
      const lineStrengthY = Math.exp(-Math.abs(dy) * 0.25);
      const pulse = (Math.sin(t * (1.0 + audioLevel * 4)) + 1) * 0.5;
      const base = (lineStrengthX + lineStrengthY) * pulse * (0.5 + audioVar * 2);
      return 1 + Math.floor(base * (amplitude - 1));
    }
    case "grade_batendo": {
      const cellSize = 4;
      const cellX = Math.floor(gx / cellSize);
      const cellY = Math.floor(gy / cellSize);
      const phase = (cellX + cellY) * 0.8;
      const beat = (Math.sin(t * (2.0 + audioLevel * 6) + phase) + 1) * 0.5;
      return 1 + Math.floor(beat * amplitude * (0.6 + audioVar * 1.4));
    }
    default:
      return Math.floor((Math.sin((dist/2.5) - t * wave_speed)+1)*0.5*amplitude) + 1;
  }
}

function draw(now) {
  if (!readyToDraw) {
    // não desenha cenário até áudio estar pronto
    requestAnimationFrame(draw);
    return;
  }
  if (!now) now = performance.now();
  if (now - lastFrameTime < FRAME_INTERVAL) {
    requestAnimationFrame(draw);
    return;
  }
  lastFrameTime = now;

  analyzeAudio();
  let t = Math.floor((now/1000)/T_STEP) * T_STEP;

  if (autoModeEnabled) {
    updateAutoControls(now, t);
  }

  let bg = get_background_color(knob5);
  ctx.fillStyle = `rgb(${bg[0]},${bg[1]},${bg[2]})`;
  ctx.fillRect(0,0,W,H);

  let tileset = tileFolders[knob1_idx];
  let count = NORMAL_TOTAL_TILES;
  let tileArr = tiles[tileset] || [];
  let main_tile = get_tile_index(knob2, count);
  let amplitude = 1 + Math.floor(lerp(0, audioLevel, 40) * (MAX_HEIGHT-1));
  let wave_speed = 1.2 + lerp(0, audioVar, 0.6)*1.5;
  let wave_length = 5 - lerp(0, audioLevel, 0.4)*2.2;

  let mode = animationModes[animationModeIdx];
  let params = { amplitude, wave_speed, wave_length, audioVar, audioLevel };

  for(let gx=0; gx<GRID_COLS; gx++){
    for(let gy=0; gy<GRID_ROWS; gy++){
      let height = alturaTile(gx, gy, t, mode, params);

      let cx = GRID_COLS/2, cy = GRID_ROWS/2;
      let dx = gx - cx, dy = gy - cy;
      let dist = Math.sqrt(dx*dx + dy*dy);
      let pulse_phase = dist / (wave_length * (0.9 + audioVar*0.3)) - t * (0.8 + audioVar * 1.7);
      let pulse = Math.floor((Math.sin(pulse_phase)+1)*0.22*(audioVar*(MAX_HEIGHT-1)));
      height += pulse;

      height = clamp(height, 1, MAX_HEIGHT);
      let h = height-1;

      let tile_index;
      if(staticTileMap && staticTileMap[gx] && staticTileMap[gx][gy] !== undefined){
        tile_index = staticTileMap[gx][gy] % tileArr.length;
      } else {
        tile_index = (main_tile + h) % tileArr.length;
      }

      let tile = tileArr[tile_index];
      if (
        tile &&
        (
          (tile instanceof HTMLImageElement && tile.complete && tile.naturalWidth !== 0) ||
          (tile instanceof HTMLCanvasElement)
        )
      ) {
        let [x, y] = iso_coords(gx, gy, h, GRID_COLS, GRID_ROWS);
        if(x+TILE_WIDTH>0 && y+TILE_HEIGHT>0 && x<W && y<H){
          ctx.drawImage(tile, x, y, TILE_WIDTH, TILE_HEIGHT);
        }
      }
    }
  }
  requestAnimationFrame(draw);
}

function updateAutoControls(now, t) {
  // Intensidade combinada do áudio para modular a velocidade
  const rawIntensity = audioLevel * AUTO_INTENSITY_LEVEL_WEIGHT + audioVar * AUTO_INTENSITY_VAR_WEIGHT;
  const audioIntensity = clamp(rawIntensity * AUTO_INTENSITY_GAIN, 0, 1);

  // detecção simples de batida (subida rápida de energia)
  const levelDelta = audioLevel - autoPrevAudioLevel;
  const isBeat =
    audioLevel > AUTO_BEAT_LEVEL_THRESHOLD &&
    levelDelta > AUTO_BEAT_DELTA_THRESHOLD;
  autoPrevAudioLevel = lerp(autoPrevAudioLevel, audioLevel, 0.5);

  const timeFactor = 0.3 + audioIntensity * 2.0; // mais volume = mudanças mais rápidas

  // Troca de modo (H automático)
  const modeIntervalSeconds = AUTO_MODE_CHANGE_BASE_INTERVAL / timeFactor;
  const modeIntervalMs = modeIntervalSeconds * 1000;
  if (now - autoLastModeChange > modeIntervalMs) {
    animationModeIdx = (animationModeIdx + 1) % animationModes.length;
    autoLastModeChange = now;
  }

  // batidas podem forçar trocas extras de modo
  if (isBeat && Math.random() < AUTO_BEAT_MODE_CHANGE_PROB) {
    animationModeIdx = (animationModeIdx + 1) % animationModes.length;
    autoLastModeChange = now;
  }

  // Em batidas, alterna às vezes entre mapa estático (bagunça) e modo “limpo”
  if (isBeat && Math.random() < AUTO_STATIC_TOGGLE_BEAT_PROB) {
    if (staticTileMap) {
      // modo limpo: tiles seguem o main_tile/altura normalmente
      staticTileMap = null;
    } else {
      // volta para o modo bagunça (equivalente a apertar 'D')
      generateStaticTileMap();
    }
  }

  // Troca de tileset (A automático)
  const tilesetIntervalSeconds = AUTO_TILESET_CHANGE_BASE_INTERVAL / (0.5 + timeFactor);
  const tilesetIntervalMs = tilesetIntervalSeconds * 1000;
  if (now - autoLastTilesetChange > tilesetIntervalMs) {
    // avança um tileset, eventualmente pulando alguns quando o áudio estiver bem forte
    const jump = 1 + Math.floor(audioIntensity * 2);
    knob1_idx = (knob1_idx + jump) % tileFolders.length;
    autoLastTilesetChange = now;
  }

  // batidas fortes podem trocar tileset imediatamente
  if (isBeat && Math.random() < AUTO_BEAT_TILESET_CHANGE_PROB) {
    const jump = 1 + Math.floor(audioIntensity * 3);
    knob1_idx = (knob1_idx + jump) % tileFolders.length;
    autoLastTilesetChange = now;
  }

  // BG contínuo: desliza pelo knob5 em loop
  const bgSpeedPerSecond = AUTO_BG_SPEED_BASE + AUTO_BG_SPEED_AUDIO_FACTOR * audioIntensity;
  const bgDelta = bgSpeedPerSecond * T_STEP;
  knob5 += bgDelta;
  if (knob5 > 1) knob5 -= 1;

  // Tile principal (knob2) se move em onda suave, reagindo ao áudio
  const knob2SpeedPerSecond = AUTO_KNOB2_SPEED_BASE + AUTO_KNOB2_SPEED_AUDIO_FACTOR * audioIntensity;
  const phase = t * knob2SpeedPerSecond * Math.PI * 2;
  const wave = (Math.sin(phase) + 1) * 0.5; // [0,1]
  knob2 = wave;
}

function saveScreenshot() {
  try {
    const dataURL = canvas.toDataURL("image/png");
    const link = document.createElement('a');
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    link.download = `orix-screenshot-${timestamp}.png`;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (err) {
    console.error("Erro ao salvar screenshot:", err);
  }
}

// Inicializa tiles mas aguarda gesto para áudio
reloadAllTiles();

// Começa já no modo de mapa estático (equivalente a apertar 'D' uma vez)
generateStaticTileMap();

// Inicialização automática de áudio e render sem gesto do usuário
setupAudio();
requestAnimationFrame(draw);

// Redimensionamento
window.addEventListener('resize', ()=>{
  setupCanvas();
});
</script>
